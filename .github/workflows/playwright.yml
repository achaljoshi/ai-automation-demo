name: Playwright + Cucumber Tests

on:
  # Run on every push to main and feature branches
  push:
    branches:
      - main
      - 'feature/**'

  # Run on pull requests to main
  pull_request:
    branches:
      - main

  # Allow the JIRA pipeline (CI Agent) to trigger this workflow via API
  workflow_dispatch:
    inputs:
      story_key:
        description: 'JIRA story key that triggered this run (e.g. PROJ-123)'
        required: false
        default: ''
      branch:
        description: 'Branch to run tests on'
        required: false
        default: 'main'

jobs:
  test:
    name: Run Playwright + Cucumber Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Playwright browsers ────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Run Cucumber tests
        run: npm test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          BROWSER: chromium
          HEADED: false

      # ── Upload test results ────────────────────────────────────────────────
      - name: Upload test results (JUnit XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # ── Upload Playwright traces ───────────────────────────────────────────
      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/traces/
          retention-days: 7
