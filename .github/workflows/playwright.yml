name: Playwright + Cucumber Tests

# Shown in the Actions list — makes the tested branch obvious for workflow_dispatch.
run-name: Playwright + Cucumber Tests — ${{ github.event.inputs.branch || github.head_ref || github.ref_name }}

on:
  # Triggered by the JIRA CI Agent after pushing generated tests to a feature branch.
  # When tests pass on the feature branch, this workflow auto-creates a PR to main.
  workflow_dispatch:
    inputs:
      story_key:
        description: 'JIRA story key that triggered this run (e.g. PROJ-123)'
        required: false
        default: ''
      branch:
        description: 'Feature branch that contains the generated tests'
        required: false
        default: 'main'

  # Validate tests when a PR to main is opened or updated.
  # Prevents merging a feature branch whose tests are failing.
  pull_request:
    branches:
      - main

permissions:
  checks: write        # required by dorny/test-reporter to create Check Runs
  contents: read
  pull-requests: write # required to post PR comments

jobs:
  test:
    name: Run Playwright + Cucumber Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Playwright browsers ────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Run Cucumber tests
        run: npm test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://practicetestautomation.com' }}
          BROWSER: chromium
          HEADED: false

      # ── Upload test results (JUnit XML + HTML report) ────────────────────
      - name: Upload test results (JUnit XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # ── Upload standalone HTML report ─────────────────────────────────────
      # Uploads the Cucumber HTML report as a separate named artifact so the
      # JIRA pipeline can include a direct download link in notifications.
      - name: Upload HTML report
        id: html-report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-html-report
          path: test-results/cucumber-report.html
          retention-days: 30

      # ── Output report URL for downstream steps / notifications ────────────
      - name: Output report URL
        if: always()
        run: |
          echo "HTML report artifact: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          echo "REPORT_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts" >> $GITHUB_ENV

      # ── Publish test results as a GitHub Check ────────────────────────────
      # Creates a "Cucumber Tests" Check Run on the commit with individual
      # scenario pass/fail visible directly in the Actions UI and on the PR.
      # Only runs when the XML file was actually produced — skips gracefully
      # on TypeScript compile errors where no test run occurred.
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always() && hashFiles('test-results/cucumber-junit.xml') != ''
        with:
          name: 'Cucumber Tests'
          path: 'test-results/cucumber-junit.xml'
          reporter: java-junit
          # Don't fail the job when tests fail — the "Run Cucumber tests"
          # step already controls the job outcome.
          fail-on-error: 'false'

      # ── Upload Playwright traces ───────────────────────────────────────────
      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/traces/
          retention-days: 7

      # Auto-create PR to main when tests pass on a feature branch.
      # Only runs when triggered via workflow_dispatch from a feature/ branch
      # and all previous steps passed.
      - name: Create PR to main (tests passed)
        if: success() && github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.branch, 'feature/')
        continue-on-error: true  # PR creation failure must not mark the test run as failed
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          STORY: ${{ github.event.inputs.story_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # GITHUB_TOKEN cannot open PRs unless repo setting "Allow GitHub Actions to
          # create and approve pull requests" is enabled. Use PR_CREATE_TOKEN (PAT with
          # repo scope) as a fallback — same token as JIRA agent GITHUB_TOKEN is fine.
          GH_TOKEN: ${{ secrets.PR_CREATE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$STORY" ]; then
            PR_TITLE="[$STORY] Auto-generated tests - ${BRANCH#feature/}"
          else
            PR_TITLE="Auto-generated tests - ${BRANCH#feature/}"
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open \
            --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH - skipping."
          else
            # Write PR body to a temp file to keep this run: block
            # properly indented (avoids YAML literal-block truncation).
            cat > /tmp/pr_body.md << PREOF
          ## Auto-generated Test PR

          **JIRA story:** ${STORY:-N/A}
          **Feature branch:** \`$BRANCH\`

          All tests passed. This PR was automatically created by the
          [Test Automation Agent](https://github.com/achaljoshi/test-automation-agent).

          ### What's in this PR
          - Gherkin feature file generated from the JIRA acceptance criteria
          - Playwright step definitions (TypeScript + Cucumber.js)
          - Page Object class (if 3+ page interactions)

          ### Test run
          All tests passed - [view CI run]($RUN_URL)

          📊 [Download HTML Report]($RUN_URL#artifacts) — open `cucumber-html-report` artifact for full scenario details

          ### Review checklist
          - [ ] Feature file scenarios match the acceptance criteria
          - [ ] Step definitions compile without errors
          - [ ] Tests pass locally (npm test)
          PREOF

            if gh pr create \
              --title "$PR_TITLE" \
              --body-file /tmp/pr_body.md \
              --base main \
              --head "$BRANCH"; then
              echo "PR created successfully."
            else
              echo "::warning::Could not create PR automatically."
              echo "Fix (choose one):"
              echo "  1. Repo Settings → Actions → General → enable"
              echo "     'Allow GitHub Actions to create and approve pull requests'"
              echo "  2. Add repository secret PR_CREATE_TOKEN (PAT with repo scope)"
              exit 1
            fi
          fi
